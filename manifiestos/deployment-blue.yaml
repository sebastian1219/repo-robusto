apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-blue
spec:
  replicas: 2
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: orders
      version: blue
  template:
    metadata:
      labels:
        app: orders
        version: blue
    spec:
      containers:
      - name: orders
        image: 637423638685.dkr.ecr.us-east-1.amazonaws.com/ciclo-final:${GITHUB_SHA}
        ports:
        - containerPort: 8080
