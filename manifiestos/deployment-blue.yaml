apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orders
      version: blue
  template:
    metadata:
      labels:
        app: orders
        version: blue
    spec:
      containers:
      - name: orders
        image: <ECR_REPO>/orders:stable
        ports:
        - containerPort: 8080
