apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orders
      version: green
  template:
    metadata:
      labels:
        app: orders
        version: green
    spec:
      containers:
      - name: orders
        image: <ECR_REPO>/orders:${GITHUB_SHA}

