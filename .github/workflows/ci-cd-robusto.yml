name: Terraform Robusto CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  leer-workflow-precario:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo central
        uses: actions/checkout@v4
        with:
          repository: sebastian1219/repo-principal
          path: repo-principal
          fetch-depth: 0

      - name: Mostrar workflow precario
        run: cat repo-principal/.github/workflows/terraform-precario.yml

  validate-infra:
    needs: leer-workflow-precario
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo robusto
        uses: actions/checkout@v4

      - name: Instalar Terraform
        run: |
          sudo apt-get update -y
          sudo apt-get install -y wget unzip
          wget https://releases.hashicorp.com/terraform/1.5.0/terraform_1.5.0_linux_amd64.zip
          unzip terraform_1.5.0_linux_amd64.zip
          sudo mv terraform /usr/local/bin/
          terraform -version

      - name: Instalar TFLint
        run: |
          curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
          tflint --version

      - name: Instalar Checkov
        run: |
          python3 -m pip install --upgrade pip
          pip install checkov
          checkov --version

      - name: Terraform Init
        run: terraform init
        working-directory: .

      - name: Terraform Validate
        run: terraform validate
        working-directory: .

      - name: Run TFLint
        run: |
          tflint --init
          tflint --recursive
        working-directory: .

      - name: Run Checkov
        run: checkov -d . --quiet --soft-fail

  build-and-push-ecr:
    needs: validate-infra
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REPO: ${{ secrets.ECR_REPO }}  
    steps:
      - name: Checkout repo robusto
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login en ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS --password-stdin $ECR_REPO

      - name: Build & Push imagen
        run: docker buildx build --platform linux/amd64 \
             -t $ECR_REPO:${GITHUB_SHA} \
             -t $ECR_REPO:stable \
             -f ./manifiestos/Dockerfile ./manifiestos \
             --push \


  deploy-blue-green:
    needs: build-and-push-ecr
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      CLUSTER_NAME: ${{ secrets.CLUSTER_NAME }}
    steps:
      - name: Checkout repo robusto (manifiestos)
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Configurar kubectl
        run: aws eks update-kubeconfig --region $AWS_REGION --name $CLUSTER_NAME

      - name: Deploy Green version
        run: kubectl apply -f manifiestos/deployment-green.yaml

      - name: Health Check Green
        run: kubectl rollout status deployment/orders-green --timeout=200s

      - name: Switch Traffic to Green
        run: kubectl apply -f manifiestos/service-green.yaml

  rollback:
   needs: deploy-blue-green
   if: failure()
   runs-on: ubuntu-latest
   env:
     AWS_REGION: ${{ secrets.AWS_REGION }}
     CLUSTER_NAME: ${{ secrets.CLUSTER_NAME }}
   steps:
     - name: Checkout repo robusto
       uses: actions/checkout@v4

     - name: Configurar credenciales AWS
       uses: aws-actions/configure-aws-credentials@v4
       with:
         aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
         aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
         aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
         aws-region: ${{ secrets.AWS_REGION }}

     - name: Configurar kubectl
       run: aws eks update-kubeconfig --region $AWS_REGION --name $CLUSTER_NAME

     - name: Rollback to Blue
       run: |
         echo "⚠️ Error detectado, revirtiendo a versión estable..."
         kubectl apply -f ./manifiestos/service-blue.yaml --validate=false
         kubectl apply -f ./manifiestos/deployment-blue.yaml --validate=false
         kubectl get pods -l app=orders,version=blue -o wide
         kubectl rollout status deployment/orders-blue --timeout=300s
           (echo "❌ Blue no levantó correctamente" && exit 1)